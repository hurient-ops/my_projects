<!DOCTYPE html>

                "inverse-on-surface": "#eff1f1",

                "surface-container-highest": "#e1e3e3",
                "surface-dim": "#d8dada",
                "on-secondary": "#ffffff",
                "surface-tint": "#22686b",

                "surface-container": "#eceeee",

                "secondary-fixed": "#ffd9e1",

            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "body-md": ["Inter"],
                "display-lg": ["Manrope"],
                "data-lg": ["Manrope"],
                "label-sm": ["Inter"],
                "headline-md": ["Manrope"],
                "body-lg": ["Inter"]
            },
            "fontSize": {
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "data-lg": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                "label-sm": ["13px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600"}],

                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8fafa;
            height: 844px;
            width: 390px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }
    </style>
</head>
<body class="font-body-md text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed border-x border-slate-100">
<!-- TopAppBar -->
<nav class="absolute top-0 left-0 bg-white dark:bg-slate-900 flex justify-between items-center w-full px-4 h-16 z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm shadow-[#509194]/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#509194] dark:text-[#509194]" data-icon="medical_services">medical_services</span>
<span class="text-xl font-bold text-[#509194] dark:text-[#509194]">Heal Us</span>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500" data-icon="sync">sync</span>
</button>
</div>
</nav>
<main class="h-full pt-20 pb-6 px-4 flex flex-col">
<!-- Header -->
<header class="mb-4 shrink-0">
<h1 class="font-headline-md text-headline-md text-on-surface mb-0.5">추가 주입</h1>
</header>
<!-- Content Area - Scrollable if needed, though fixed for this layout -->
<div class="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-4">
<!-- Safety Guidelines Card -->
<section class="bg-secondary-container/10 border border-secondary/20 p-3.5 rounded-xl flex gap-3 items-start shadow-sm shrink-0">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<h2 class="font-label-sm text-label-sm text-secondary mb-0.5">안전 가이드라인</h2>
<ul class="space-y-0.5"><li class="font-body-md text-on-surface-variant flex items-start gap-2 text-[12px]"><span class="w-1 h-1 bg-secondary rounded-full mt-2 shrink-0"></span><span>추가주입은 인슐린이 부족하다고 느낄 때 추가적으로 인슐린 단위수(unit)를 설정하여 주입</span></li><li class="font-body-md text-on-surface-variant flex items-start gap-2 text-[12px]"><span class="w-1 h-1 bg-secondary rounded-full mt-2 shrink-0"></span><span>1회 30Unit이상 연속주입가능, 1일 전체 50Unit이상 주입가능 (필요시 1일 주입제한 단위수 내에서 계속주입 가능)</span></li></ul>
</div>
</section>
<!-- Current Summary Table -->
<section class="bg-surface-container-low p-4 rounded-xl border border-outline-variant shadow-sm shrink-0">
<h3 class="font-label-sm text-[11px] text-on-surface-variant mb-3 uppercase tracking-wider">현재 요약</h3>
<div class="grid grid-cols-3 gap-2">
<div class="flex flex-col gap-0.5">
<span class="font-label-sm text-[10px] text-outline">기초</span>
<span class="font-headline-md text-base text-primary">12.50 U</span>
</div>
<div class="flex flex-col gap-0.5 border-x border-outline-variant/30 px-3">
<span class="font-label-sm text-[10px] text-outline">식사</span>
<span class="font-headline-md text-base text-primary">8.25 U</span>
</div>
<div class="flex flex-col gap-0.5 text-right">
<span class="font-label-sm text-[10px] text-outline">추가</span>
<span class="font-headline-md text-base text-secondary">2.00 U</span>
</div>
</div>
</section>
<!-- Input Area - Bento Style Control -->
<section class="shrink-0">
<div class="bg-white p-5 rounded-2xl border border-primary/10 shadow-lg shadow-primary/5">
<label class="font-label-sm text-label-sm text-primary mb-3 block text-center">추가 주입 설정</label>
<div class="flex items-center justify-between mb-6">
<button class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center active:scale-90 transition-transform text-on-surface hover:bg-surface-container">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<div class="text-center">
<span class="font-data-lg text-4xl text-on-surface tracking-tighter">1.00</span>
<span class="font-headline-md text-primary ml-1">U</span>
</div>
<button class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center active:scale-90 transition-transform hover:brightness-110">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
</section>
<!-- Visual Prompt/Illustration -->
<div class="relative w-full aspect-video rounded-2xl overflow-hidden shadow-md shrink-0">
<img alt="Medical device focus" class="w-full h-full object-cover" data-alt="Close-up of a high-tech medical glucose monitor with soft bokeh, clean clinical laboratory environment, soft blue and teal lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDW_2WSwOZNpwdt8yYNW421-6-CnEmcnXOiLsA7frR-MKnFe6zyKRfuc4i277vDkm-dYGy6yphvWtu8NxeJN2Z9dDVWKvt3rh9gk6JPHLGuMbciZIm6EtUZXhtqDP7vX3k7GnZTrgl3Bwa9Y1P0pwDIUfWjwI-m6A04M2WEkZBYNg5KpYD1JB6z8QgWvsWsyCbyak7atBuAgdlIBXQwztY4aeXOJTiTEUIgClrvPWhYTFftLw4hiqkBLZeRQm6vNkyHWaf2ZvfiFsUJ"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-3">
<p class="text-white font-label-sm text-[11px] leading-tight opacity-95">확인 전 캐뉼라가 올바르게 삽입되었는지 확인하십시오.</p>
</div>
</div>
</div>
<!-- Action Buttons - Fixed at bottom of main content area -->
<div class="flex flex-col gap-2 mt-4 shrink-0">
<button class="w-full bg-primary text-on-primary h-12 rounded-full font-headline-md text-base flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all"><span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>추가주입</button>
<button class="w-full bg-surface-container text-on-surface-variant h-12 rounded-full font-headline-md text-base flex items-center justify-center active:scale-[0.98] transition-all">닫기</button>
</div>
</main>
<style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
</style>
</body></html>
