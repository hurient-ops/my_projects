<!DOCTYPE html>

<html class="light" lang="ko"><head>

                    "inverse-on-surface": "#eff1f1",
                    "on-surface": "#191c1d",
                    "surface-container-highest": "#e1e3e3",
                    "surface-dim": "#d8dada",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#22686b",
                    "surface": "#f8fafa",
                    "surface-container": "#eceeee",
                    "on-secondary-fixed-variant": "#8b0e45",
                    "secondary-fixed": "#ffd9e1",
                    "on-background": "#191c1d",
                    "surface-variant": "#e1e3e3",
                    "tertiary-fixed-dim": "#b8cac9",

                    "on-primary-fixed-variant": "#004f52",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "md": "24px",
                    "sm": "12px",
                    "xs": "4px",
                    "base": "8px",
                    "lg": "40px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "display-lg": ["Manrope"],
                    "data-lg": ["Manrope"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Manrope"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "data-lg": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        .ios-bottom-padding {
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* Lock vertical dimension to standard dashboard height */
        body {
            height: 852px;
            width: 393px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background flex flex-col">
<!-- TopAppBar -->
<header class="h-14 flex justify-between items-center px-4 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shadow-sm shadow-[#509194]/5 shrink-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#509194] dark:text-[#509194]" data-icon="medical_services" style="">medical_services</span>
<h1 class="font-manrope text-base font-semibold tracking-tight text-on-surface" style="">HealUs</h1>
</div>
<div class="flex items-center">
<button class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors active:opacity-70" style="">
<span class="material-symbols-outlined text-[#509194] dark:text-[#509194]" data-icon="sync" style="">sync</span>
</button>
</div>
</header>
<!-- Main Scrollable Content -->
<main class="flex-1 overflow-y-auto px-margin-mobile pt-3 pb-3">
<!-- Screen Title Section -->
<section class="mb-2">
<h2 class="font-headline-md text-xl text-on-surface" style="">식사 주입</h2>
</section>
<!-- Instruction Info Box -->
<section class="mb-3">
<div class="bg-primary/5 border border-[#E0E7E7] rounded-xl p-3 flex gap-2 shadow-sm shadow-[#509194]/5">
<span class="material-symbols-outlined text-primary text-xl" data-icon="info" style="">info</span>
<div>
<p class="font-label-sm text-xs text-primary uppercase mb-1" style="">안전 수칙</p>
<p class="font-body-md text-[11px] text-on-surface-variant leading-tight" style="">식사주입은 식사설정에서 설정한 인슐린 단위 수(Unit)만큼 주입<br/>- 식사 주입 1회 주입 완료 후 <span class="font-bold text-[#509194]">"2시간, 3시간"</span> 주기로 제한하여 주입가능 (과다주입, 저혈당 쇼크 방지)<br/>- 식사 설정에 설정된 단위수를 식사 주입 메뉴로 이동, 수정하여 가감된 단위수를 주입할 수 있음</p>
</div>
</div>
</section>
<!-- Input Fields -->
<div class="flex flex-col gap-2.5 mb-4"><!-- Breakfast Card -->
<div class="bg-white border border-[#E0E7E7] rounded-xl p-3 shadow-sm flex items-center gap-3">
<div class="flex flex-col gap-1 w-16 shrink-0">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="wb_sunny" style="">wb_sunny</span>
<h3 class="font-label-sm text-[13px] text-on-surface-variant" style="">아침</h3>
</div>
</div>
<div class="relative flex-1">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 text-base font-headline-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="0.00" step="0.01" type="number" value="1.00"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 font-label-sm text-xs text-on-surface-variant" style="">단위 (U)</span>
</div>
</div>
<!-- Lunch Card -->
<div class="bg-white border border-[#E0E7E7] rounded-xl p-3 shadow-sm flex items-center gap-3">
<div class="flex flex-col gap-1 w-16 shrink-0">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="light_mode" style="">light_mode</span>
<h3 class="font-label-sm text-[13px] text-on-surface-variant" style="">점심</h3>
</div>
</div>
<div class="relative flex-1">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 text-base font-headline-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="0.00" step="0.01" type="number" value="1.00"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 font-label-sm text-xs text-on-surface-variant" style="">단위 (U)</span>
</div>
</div>
<!-- Dinner Card -->
<div class="bg-white border border-[#E0E7E7] rounded-xl p-3 shadow-sm flex items-center gap-3">
<div class="flex flex-col gap-1 w-16 shrink-0">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-tertiary text-[18px]" data-icon="bedtime" style="">bedtime</span>
<h3 class="font-label-sm text-[13px] text-on-surface-variant" style="">저녁</h3>
</div>
</div>
<div class="relative flex-1">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-2.5 px-3 text-base font-headline-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="0.00" step="0.01" type="number" value="1.00"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 font-label-sm text-xs text-on-surface-variant" style="">단위 (U)</span>
</div>
</div></div>
<!-- Visual Context Image -->
<div class="mb-2 rounded-2xl overflow-hidden h-24 relative group">
<img alt="Healthy fresh meal" class="w-full h-full object-cover" data-alt="top-down view of a colorful mediterranean salad with chickpeas and fresh vegetables on a white plate in soft natural daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7BsPbtiofMje8N5huMTMK_qFMniJscTt1tLaif1JeHvPodAEOwnEBEBUyloZo9I8DThIuTcbju3YiFv0yEv8LLwNsqLniiStj6jle-WLw2FYQ2OMpV07vChIvL4cggcji_8o0kF6v8jGhVkUJ6wY-d4gbZ3NkqOHMxKd8e_WF5OkJcAeUf5PZgP5xFm-7h0WZ1Urz2cECyI_MR3BjeFl-PsuRjqqacMbo9_cAaxtrshQ4X6S40e6kvZCNcKywsylEP4qxdjgeAi9z" style=""/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-3 left-3">
<p class="text-white font-label-sm text-[11px]" style="">섭취량에 맞게 정확하게 주입하세요</p>
</div>
</div>
</main>
<!-- Fixed Bottom Actions -->
<footer class="shrink-0 bg-background pb-4 pt-2 ios-bottom-padding">
<div class="px-margin-mobile flex flex-col gap-2">
<button class="w-full bg-primary text-on-primary py-3 rounded-full font-headline-md text-sm shadow-md shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined text-[20px]" data-icon="vaccines" style='font-variation-settings: "FILL" 1;'>vaccines</span>
주입하기
</button>
<button class="w-full bg-surface-container-highest text-on-surface-variant py-3 rounded-full font-body-md text-sm hover:bg-surface-dim transition-colors active:scale-[0.98]" style="">
닫기
</button>
</div>
</footer>
</body></html>
