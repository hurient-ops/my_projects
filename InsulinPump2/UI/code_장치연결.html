<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#6f7979",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#3f001b",
                    "outline-variant": "#bfc8c8",
                    "secondary": "#ab2c5d",
                    "inverse-primary": "#90d2d5",
                    "on-tertiary-container": "#f3fffe",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#aceef1",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#eff1f1",
                    "on-surface": "#191c1d",
                    "surface-container-highest": "#e1e3e3",
                    "surface-dim": "#d8dada",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#22686b",
                    "surface": "#f8fafa",
                    "surface-container": "#eceeee",
                    "on-secondary-fixed-variant": "#8b0e45",
                    "secondary-fixed": "#ffd9e1",
                    "on-background": "#191c1d",
                    "surface-variant": "#e1e3e3",
                    "tertiary-fixed-dim": "#b8cac9",
                    "on-primary-fixed": "#002021",
                    "surface-container-high": "#e6e8e9",
                    "surface-container-low": "#f2f4f4",
                    "inverse-surface": "#2e3131",
                    "secondary-fixed-dim": "#ffb1c5",
                    "tertiary": "#4f5f5f",
                    "background": "#f8fafa",
                    "surface-bright": "#f8fafa",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#f3ffff",
                    "on-surface-variant": "#3f4849",
                    "secondary-container": "#fd6c9c",
                    "tertiary-container": "#677877",
                    "on-tertiary-fixed-variant": "#3a4a49",
                    "on-secondary-container": "#6e0034",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#0e1e1e",
                    "error": "#ba1a1a",
                    "primary-container": "#3c7e81",
                    "primary": "#1f6568",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#004f52",
                    "primary-fixed-dim": "#90d2d5",
                    "tertiary-fixed": "#d4e6e5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "gutter": "16px",
                    "md": "24px",
                    "sm": "12px",
                    "xs": "4px",
                    "base": "8px",
                    "lg": "40px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "display-lg": ["Manrope"],
                    "data-lg": ["Manrope"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Manrope"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "data-lg": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                    "label-sm": ["13px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #f8fafa;
            background-image: radial-gradient(at 100% 0%, rgba(80, 145, 148, 0.05) 0px, transparent 50%),
                              radial-gradient(at 0% 100%, rgba(171, 44, 93, 0.03) 0px, transparent 50%);
        }
        body {
            /* Standard fixed height to match dashboard layout */
            height: 844px;
            width: 390px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        main {
            height: calc(844px - 64px); /* Total height minus header */
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        main::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-mesh text-on-surface font-body-md border-x border-slate-100 shadow-2xl">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 top-0 border-b border-slate-100 dark:border-slate-800 shadow-sm shadow-[#509194]/5 flex justify-between items-center w-full px-4 h-16 sticky z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#509194] dark:text-[#509194]" data-icon="medical_services" style="">medical_services</span>
<h1 class="font-manrope text-base font-semibold tracking-tight text-[#509194] dark:text-[#509194]" style="">장치 연결</h1>
</div>
</header>
<main class="w-full px-margin-mobile pt-sm pb-8 space-y-6">
<!-- Alert Banner -->
<div class="mt-xs bg-error-container/40 border border-error/10 rounded-xl p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-error" data-icon="warning" style="font-variation-settings: &quot;FILL&quot; 1;">warning</span>
<div>
<h3 class="text-error font-label-sm uppercase tracking-wider" style="">조치가 필요함</h3>
<p class="text-on-error-container text-body-md font-medium mt-1" style="">서비스를 이용하려면 장치 연결이&nbsp;<div>필요합니다.</div></p>
</div>
</div>
<!-- Search Status / Hero Section -->
<div class="relative overflow-hidden bg-white rounded-3xl p-8 shadow-sm border border-outline-variant/30 text-center space-y-4">
<div class="relative w-24 h-24 mx-auto mb-6">
<div class="absolute inset-0 border-2 border-primary/20 rounded-full scale-110"></div>
<div class="absolute inset-0 border-2 border-primary/40 rounded-full scale-125 opacity-20"></div>
<div class="w-full h-full bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="bluetooth_searching" style="">bluetooth_searching</span>
</div>
</div>
<h2 class="font-headline-md text-headline-md text-on-background" style="">장치 선택</h2>
<div class="flex items-center justify-center gap-2 text-primary">
<span class="material-symbols-outlined animate-spin" data-icon="progress_activity" style="">progress_activity</span>
<span class="font-label-sm" style="">검색 중...</span>
</div>
<p class="text-on-surface-variant font-body-md px-4" style="">인슐린 펌프가 페어링 모드이고 근처에 있는지 확인하세요.</p>
</div>
<!-- Devices List -->
<div class="space-y-3">
<div class="flex items-center justify-between px-1">
<span class="font-label-sm text-on-surface-variant uppercase tracking-widest" style="">사용 가능한 장치</span>
<span class="font-label-sm text-primary" style="">2개 발견</span>
</div>
<!-- Device Item 1 -->
<button class="w-full bg-white border border-outline-variant/30 p-4 rounded-2xl flex items-center gap-4 hover:border-primary/50 transition-all active:scale-[0.98] shadow-sm" style="">
<div class="w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="monitor_heart" style="font-variation-settings: &quot;FILL&quot; 1;">monitor_heart</span>
</div>
<div class="flex-1 text-left">
<div class="flex items-center gap-2">
<span class="font-headline-md text-body-lg text-on-surface" style="">Heal Us</span>
<span class="bg-primary/10 text-primary text-[10px] font-bold px-1.5 py-0.5 rounded-md uppercase" style="">신호 강함</span>
</div>
<code class="text-on-surface-variant font-label-sm tracking-tighter">20:73:6A:19:3E:41</code>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right" style="">chevron_right</span>
</button>
<!-- Device Item 2 -->
<button class="w-full bg-white border border-outline-variant/30 p-4 rounded-2xl flex items-center gap-4 hover:border-primary/50 transition-all active:scale-[0.98] shadow-sm" style="">
<div class="w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="settings_input_antenna" style="">settings_input_antenna</span>
</div>
<div class="flex-1 text-left">
<div class="flex items-center gap-2">
<span class="font-headline-md text-body-lg text-on-surface" style="">Pump_X2_889</span>
</div>
<code class="text-on-surface-variant font-label-sm tracking-tighter">44:21:BC:92:1F:02</code>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right" style="">chevron_right</span>
</button>
</div>
<!-- Help Info Card -->
</main>
<!-- BottomNavBar -->
</body></html>
