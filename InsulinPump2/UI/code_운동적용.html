<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>운동 적용</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8fafa",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#ffb1c5",
                        "secondary-container": "#fd6c9c",
                        "tertiary-fixed": "#d4e6e5",
                        "primary-fixed-dim": "#90d2d5",
                        "on-secondary-container": "#6e0034",
                        "on-primary-container": "#f3ffff",
                        "on-primary-fixed-variant": "#004f52",
                        "on-background": "#191c1d",
                        "surface-container-high": "#e6e8e9",
                        "on-error-container": "#93000a",
                        "surface-container": "#eceeee",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f2f4f4",
                        "inverse-surface": "#2e3131",
                        "inverse-primary": "#90d2d5",
                        "surface": "#f8fafa",
                        "primary-fixed": "#aceef1",
                        "on-tertiary-fixed-variant": "#3a4a49",
                        "error": "#ba1a1a",
                        "outline-variant": "#bfc8c8",
                        "tertiary-fixed-dim": "#b8cac9",
                        "surface-dim": "#d8dada",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#f3fffe",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ffd9e1",
                        "secondary": "#ab2c5d",
                        "surface-variant": "#e1e3e3",
                        "on-surface": "#191c1d",
                        "surface-tint": "#22686b",
                        "inverse-on-surface": "#eff1f1",
                        "tertiary": "#4f5f5f",
                        "surface-container-highest": "#e1e3e3",
                        "primary": "#1f6568",
                        "on-surface-variant": "#3f4849",
                        "on-secondary-fixed": "#3f001b",
                        "on-primary-fixed": "#002021",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#0e1e1e",
                        "outline": "#6f7979",
                        "on-error": "#ffffff",
                        "tertiary-container": "#677877",
                        "surface-bright": "#f8fafa",
                        "primary-container": "#3c7e81",
                        "on-secondary-fixed-variant": "#8b0e45"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "sm": "12px",
                        "lg": "40px",
                        "gutter": "16px",
                        "base": "8px",
                        "xs": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "data-lg": ["Manrope"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Manrope"],
                        "display-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "data-lg": ["48px", { "lineHeight": "48px", "fontWeight": "800" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["13px", { "lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-950 font-['Manrope'] antialiased tracking-tight docked full-width top-0 border-b border-teal-50/50 dark:border-teal-900/20 shadow-[0_2px_15px_-3px_rgba(80,145,148,0.08)] flex justify-between items-center w-full px-4 h-16 z-50 sticky">
<button aria-label="Go back" class="material-symbols-outlined text-teal-600 dark:text-teal-400 active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-teal-50">
            arrow_back
        </button>
<h1 class="text-xl font-bold tracking-tight text-teal-700 dark:text-teal-300">운동 적용</h1>
<div class="w-10 h-10"></div> <!-- Placeholder to balance the flex layout -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-gutter flex flex-col gap-lg">
<!-- Instruction Box -->
<section class="bg-surface-container-low rounded-xl p-gutter border border-outline-variant/30 shadow-sm flex gap-sm items-start">
<span class="material-symbols-outlined text-primary shrink-0 mt-1" style="font-variation-settings: 'FILL' 1;">info</span>
<div class="flex flex-col gap-xs"><h2 class="font-label-sm text-label-sm text-on-surface">안전한 운동을 위해</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
    운동적용은 "운동할 시간"과 "감량비율"을 설정한 후 그 시간 만큼 기초설정의 값을 감량하여 주입
</p>
<ul class="list-disc list-inside mt-2 font-body-md text-body-md text-on-surface-variant space-y-1">
<li class="whitespace-nowrap">운동시간을 1시간~8시간까지 설정가능</li>
<li>설정된 시간마다 운동감량 비율을 10%~100%까지 설정 또는 해제가능</li>
</ul></div>
</section>
<!-- Configuration Form -->
<section class="flex flex-col gap-md bg-surface-container-lowest rounded-xl p-gutter shadow-sm border border-outline-variant/20">
<!-- Time Setting Field -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-xs" for="time-setting">
<span class="material-symbols-outlined text-[18px] text-primary">schedule</span>
                    시간 설정
                </label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-outline-variant text-on-background font-body-lg text-body-lg rounded-lg px-gutter py-sm h-14 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow cursor-pointer" id="time-setting">
<option value="0.5">30분</option>
<option selected="" value="1">1시간</option>
<option value="1.5">1시간 30분</option>
<option value="2">2시간</option>
<option value="3">3시간</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<hr class="border-outline-variant/30"/>
<!-- Reduction Setting Field -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-background flex items-center gap-xs" for="reduction-setting">
<span class="material-symbols-outlined text-[18px] text-primary">trending_down</span>
                    감량 설정
                </label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-outline-variant text-on-background font-body-lg text-body-lg rounded-lg px-gutter py-sm h-14 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow cursor-pointer" id="reduction-setting">
<option value="10">10% 감소</option>
<option selected="" value="20">20% 감소</option>
<option value="30">30% 감소</option>
<option value="40">40% 감소</option>
<option value="50">50% 감소</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Bottom Action Area -->
<div class="mt-auto pt-lg pb-sm flex gap-gutter">
<button class="flex-[2] bg-primary text-on-primary font-label-sm text-label-sm h-14 rounded-full active:scale-95 transition-transform duration-200 shadow-[0_4px_12px_rgba(31,101,104,0.25)] flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[20px]">directions_run</span>
                운동적용
            </button>
<button class="flex-1 bg-surface-container-high text-on-surface font-label-sm text-label-sm h-14 rounded-full active:scale-95 transition-transform duration-200 shadow-sm flex items-center justify-center">
                닫기
            </button>
</div>
</main>
</body></html>
